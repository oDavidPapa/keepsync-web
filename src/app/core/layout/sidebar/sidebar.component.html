<aside class="aside" [class.mobile-open]="mobileOpen">
  <div class="sidebar">
    <!-- HEADER do card -->
    <div class="sidebar-header">
      <div class="brand-text">
        <div class="brand-logo" aria-label="KeepSync">
          <span class="brand-logo__keep">Keep</span><span class="brand-logo__sync">Sync</span>
        </div>
        <div class="brand-subtitle expand-only">Calendar Hub</div>
      </div>
    </div>

    <div class="nav">
      <a *ngFor="let item of nav(); trackBy: trackByRoute" [routerLink]="item.route" routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }" class="nav-link">
        <span class="material-symbols-rounded icon">{{ item.icon }}</span>
        <span class="label">{{ item.label }}</span>
        <span *ngIf="item.badge" class="message-count">{{ item.badge }}</span>
      </a>
    </div>

    <!-- FOOTER do card (sempre no fundo) -->
    <div class="sidebar-footer">
      <div class="current-user-footer expand-only" *ngIf="currentUserEmail()">
        <span class="current-user-name">{{ currentUserName() }}</span>
        <span class="current-user-email">{{ currentUserEmail() }}</span>
      </div>

      <button class="nav-link logout" type="button" (click)="logout()">
        <span class="material-symbols-rounded icon">logout</span>
        <span class="label">Sair</span>
      </button>
    </div>
  </div>
</aside>
