<div class="ui-page ui-page-fit calendar-page">
  <app-page-header
    title="Calendario"
    subtitle="Visao mensal das reservas por propriedade e canal."
    [sticky]="false"
    [top]="0"
  >
    <div class="calendar-header-actions">
      <button class="ui-btn ghost" type="button" (click)="prevMonth()" [disabled]="loading()">
        <span class="material-symbols-rounded">chevron_left</span>
      </button>

      <div class="calendar-month-label">{{ monthLabel() }}</div>

      <button class="ui-btn ghost" type="button" (click)="nextMonth()" [disabled]="loading()">
        <span class="material-symbols-rounded">chevron_right</span>
      </button>

      <button class="ui-btn primary" type="button" (click)="goToday()" [disabled]="loading()">
        Hoje
      </button>
    </div>
  </app-page-header>

  <section class="calendar-toolbar">
    <div class="calendar-toolbar-row">
      <div class="channel-filters">
        <button
          class="channel-chip"
          *ngFor="let channel of availableChannels"
          type="button"
          [class.off]="!channelFilters()[channel.id]"
          (click)="toggleChannel(channel.id)"
        >
          <span class="channel-dot" [attr.data-channel]="channel.id"></span>
          {{ channel.label }}
        </button>
      </div>

      <div class="ui-field property-filter">
        <label for="calendarProperty">Propriedade</label>
        <select
          id="calendarProperty"
          [ngModel]="selectedPropertyId()"
          (ngModelChange)="selectedPropertyId.set($event)"
        >
          <option value="all">Todas</option>
          <option *ngFor="let property of properties()" [value]="property.id">
            {{ property.name }}
          </option>
        </select>
      </div>
    </div>
  </section>

  <section class="month-card" [class.mobile]="isMobile()">
    <div class="calendar-feedback error" *ngIf="error()">
      {{ error() }}
    </div>

    <div class="calendar-feedback" *ngIf="!error() && loading()">
      Carregando reservas...
    </div>

    <div class="calendar-feedback" *ngIf="!error() && !loading() && visibleMonthReservations().length === 0">
      Nenhuma reserva encontrada para os filtros selecionados neste mes.
    </div>

    <div class="dow-row">
      <div class="dow">Seg</div>
      <div class="dow">Ter</div>
      <div class="dow">Qua</div>
      <div class="dow">Qui</div>
      <div class="dow">Sex</div>
      <div class="dow">Sab</div>
      <div class="dow">Dom</div>
    </div>

    <div class="month-viewport" [class.no-scroll]="isMobile()">
      <div class="month-grid" [class.mini]="isMobile()">
        <div class="weeks">
          <div class="week" *ngFor="let week of weeks()">
            <div
              class="cell"
              *ngFor="let day of week.days"
              [class.out]="!day.inMonth"
              [class.today]="day.isToday"
              [class.has-booking]="day.bookings.length > 0"
              [class.mini-cell]="isMobile()"
            >
              <div class="cell-head">
                <span class="num">{{ day.day }}</span>
              </div>

              <div class="mini-dots" *ngIf="isMobile() && day.bookings.length > 0">
                <span
                  class="dot-mini"
                  *ngFor="let reservation of day.bookings | slice:0:3"
                  [attr.data-channel]="reservation.channel"
                ></span>
                <span class="more-mini" *ngIf="day.bookings.length > 3">
                  +{{ day.bookings.length - 3 }}
                </span>
              </div>
            </div>

            <div class="lanes" *ngIf="!isMobile()" [style.gridTemplateRows]="laneRows(week.lanes.length)">
              <ng-container *ngFor="let lane of week.lanes; let rowIndex = index">
                <div
                  class="bar"
                  *ngFor="let segment of lane"
                  [attr.data-channel]="segment.reservation.channel"
                  [style.gridRow]="rowIndex + 1"
                  [style.gridColumn]="(segment.startCol + 1) + ' / ' + (segment.endCol + 2)"
                  [class.start]="segment.isStart"
                  [class.end]="segment.isEnd"
                  [title]="reservationTooltip(segment.reservation)"
                >
                  <span class="bar-text">{{ reservationBarLabel(segment.reservation) }}</span>
                </div>
              </ng-container>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
